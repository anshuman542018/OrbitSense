# Daily OrbitSense pipeline on free GitHub Actions compute.
#
# For now: ingest the CelesTrak active catalog into the parquet element
# ledger and commit it to the data branch. Screening, detection, and
# narration stages are appended here as they land (Phases 2-4).
#
# The ledger lives on the `data` branch of this repo (kept out of `main`
# so code history stays clean). The dashboard reads derived JSON from the
# same branch via the raw CDN.

name: daily-pipeline

on:
  schedule:
    - cron: "30 4 * * *"   # daily, offset from the top of the hour (Actions load)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Check out data branch into data/
        uses: actions/checkout@v4
        with:
          ref: data
          path: data
        continue-on-error: true   # first run: branch does not exist yet

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run pipeline (ingest, screen, detect, narrate, feed)
        env:
          # Set GEMINI_API_KEY (free tier) or ANTHROPIC_API_KEY in repo secrets
          # to upgrade narration; without it the pipeline uses template cards.
          ORBITSENSE_LLM: ${{ vars.ORBITSENSE_LLM || 'none' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Critical close-approach email alerts — sent only if ALERT_TO is set.
          # Set these as repo secrets/variables to enable (see README).
          ORBITSENSE_ALERT_TO: ${{ secrets.ORBITSENSE_ALERT_TO }}
          ORBITSENSE_ALERT_KM: ${{ vars.ORBITSENSE_ALERT_KM || '1.0' }}
          ORBITSENSE_SMTP_HOST: ${{ vars.ORBITSENSE_SMTP_HOST || 'smtp.gmail.com' }}
          ORBITSENSE_SMTP_PORT: ${{ vars.ORBITSENSE_SMTP_PORT || '587' }}
          ORBITSENSE_SMTP_USER: ${{ secrets.ORBITSENSE_SMTP_USER }}
          ORBITSENSE_SMTP_PASS: ${{ secrets.ORBITSENSE_SMTP_PASS }}
        run: orbitsense run --data data --group active --hours 72

      - name: Commit ledger + events to data branch
        run: |
          cd data
          # Publish data/ as a standalone orphan branch, robust whether or not
          # the earlier checkout of `data` succeeded (it fails on the very
          # first run when the branch does not exist yet).
          rm -rf .git
          git init -q -b data
          git config user.name "orbitsense-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -q -m "pipeline: $(date -u +%F)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data:data
